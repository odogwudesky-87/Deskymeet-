<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding-top:60px;
}

form{
background:#1a1a1a;
padding:20px;
max-width:350px;
margin:auto;
border-radius:20px;
}

input{
width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:10px;
}

button{
padding:15px 30px;
border:none;
background:#ff0066;
color:white;
border-radius:10px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Login ❤️</h1>

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</body>
</html>
